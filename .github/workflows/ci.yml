name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: node scripts/ensure-edge-engine.mjs
      - run: npm run build -w @natt-pundit/contracts
      - run: npm run build -w @natt-pundit/natt-core
      - run: npm test
